name: Deploy Anchor Programs

on:
  push:
    branches: ["main"]
    paths:
      - "programs/**"
      - "Anchor.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-anchor.yml"
  workflow_dispatch:
    inputs:
      network:
        description: "Target cluster"
        type: choice
        options:
          - devnet
          - mainnet
        default: devnet

concurrency:
  group: deploy-anchor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Anchor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANCHOR_VERSION: "0.30.1"
      SOLANA_VERSION: "1.18.18"
      ANCHOR_WALLET: /home/runner/.config/solana/id.json
      DEPLOY_NETWORK: ${{ github.event_name == 'workflow_dispatch' && inputs.network || 'devnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          curl -sSfL --retry 5 --retry-delay 3 "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" -o solana.tar.bz2
          tar -xjf solana.tar.bz2
          echo "$PWD/solana-release/bin" >> "$GITHUB_PATH"
          solana-release/bin/solana --version

      - name: Install Anchor CLI
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo install anchor-cli --version "0.30.1"
          anchor --version

      - name: Configure wallet (devnet)
        if: env.DEPLOY_NETWORK == 'devnet'
        run: |
          mkdir -p /home/runner/.config/solana
          printf '%s' "${{ secrets.ANCHOR_WALLET_DEVNET }}" > /home/runner/.config/solana/id.json
          solana config set --keypair "$ANCHOR_WALLET"
          solana config set --url "${{ secrets.SOLANA_RPC_URL_DEVNET }}"

      - name: Configure wallet (mainnet)
        if: env.DEPLOY_NETWORK == 'mainnet'
        run: |
          mkdir -p /home/runner/.config/solana
          printf '%s' "${{ secrets.ANCHOR_WALLET_MAINNET }}" > /home/runner/.config/solana/id.json
          solana config set --keypair "$ANCHOR_WALLET"
          solana config set --url "${{ secrets.SOLANA_RPC_URL_MAINNET }}"

      - name: Generate program keypair and sync declare_id
        run: |
          mkdir -p target/deploy
          solana-keygen new -o target/deploy/kangklip_credits-keypair.json --no-bip39-passphrase --force
          PROGRAM_ID=$(solana address -k target/deploy/kangklip_credits-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/" programs/kangklip_credits/src/lib.rs
          sed -i "s/kangklip_credits = \".*\"/kangklip_credits = \"$PROGRAM_ID\"/" Anchor.toml

      - name: Anchor build
        run: |
          find . -name "Cargo.lock" -delete
          anchor build

      - name: Anchor deploy
        run: anchor deploy
