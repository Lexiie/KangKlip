name: Deploy Anchor Programs

on:
  push:
    branches: ["main"]
    paths:
      - "programs/**"
      - "Anchor.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-anchor.yml"
      - ".github/anchor-build.Dockerfile"
  workflow_dispatch:
    inputs:
      network:
        description: "Target cluster"
        type: choice
        options:
          - devnet
          - mainnet
        default: devnet

concurrency:
  group: deploy-anchor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Anchor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_NETWORK: ${{ github.event_name == 'workflow_dispatch' && inputs.network || 'devnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/anchor-build.tar
          key: anchor-build-${{ hashFiles('.github/anchor-build.Dockerfile') }}

      - name: Build Docker image
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker build -f .github/anchor-build.Dockerfile -t anchor-build:local .
          docker save anchor-build:local -o /tmp/anchor-build.tar

      - name: Load Docker image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/anchor-build.tar

      - name: Configure wallet (devnet)
        if: env.DEPLOY_NETWORK == 'devnet'
        run: |
          mkdir -p $HOME/.config/solana
          printf '%s' "${{ secrets.ANCHOR_WALLET_DEVNET }}" > $HOME/.config/solana/id.json

      - name: Configure wallet (mainnet)
        if: env.DEPLOY_NETWORK == 'mainnet'
        run: |
          mkdir -p $HOME/.config/solana
          printf '%s' "${{ secrets.ANCHOR_WALLET_MAINNET }}" > $HOME/.config/solana/id.json

      - name: Build and deploy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v $HOME/.config/solana:/root/.config/solana \
            -w /workspace \
            -e DEPLOY_NETWORK=${{ env.DEPLOY_NETWORK }} \
            -e SOLANA_RPC_URL=${{ env.DEPLOY_NETWORK == 'devnet' && secrets.SOLANA_RPC_URL_DEVNET || secrets.SOLANA_RPC_URL_MAINNET }} \
            anchor-build:local bash -c "
              set -e
              solana config set --keypair /root/.config/solana/id.json
              solana config set --url \$SOLANA_RPC_URL
              mkdir -p target/deploy
              solana-keygen new -o target/deploy/kangklip_credits-keypair.json --no-bip39-passphrase --force
              PROGRAM_ID=\$(solana address -k target/deploy/kangklip_credits-keypair.json)
              echo \"Program ID: \$PROGRAM_ID\"
              sed -i \"s/declare_id!(\\\".*\\\")/declare_id!(\\\"\\$PROGRAM_ID\\\")/\" programs/kangklip_credits/src/lib.rs
              sed -i \"s/kangklip_credits = \\\".*\\\"/kangklip_credits = \\\"\\$PROGRAM_ID\\\"/\" Anchor.toml
              anchor build
              anchor deploy
            "
